name: Ubuntu

on:
  push:
  pull_request:

jobs:
  test-opt:
    name: Build everything
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6


      - name: Mount bazel cache
        uses: actions/cache@v5.0.5
        with:
          path: "~/.cache/bazel"
          key: bazel-gcc-${{ runner.os }}-${{ hashFiles('.bazelrc', '.bazelversion', 'WORKSPACE*', 'MODULE.bazel') }}
          restore-keys: |
            bazel-gcc-${{ runner.os }}-
            bazel-gcc-

      - name: Show compiler selection
        run: |
          "$CC" --version
          "$CXX" --version

      - run: bazel test -c dbg -s //...

  coverage:
    name: Gather coverage metrics
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
      GCOV: gcov-14  # must match CC, or gcov rejects the .gcda/.gcno data (version 'B42*', prefer 'B33*')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6


      - name: Mount bazel cache
        uses: actions/cache@v5.0.5
        with:
          path: "~/.cache/bazel"
          key: bazel-coverage-${{ runner.os }}-${{ hashFiles('.bazelrc', '.bazelversion', 'WORKSPACE*', 'MODULE.bazel') }}
          restore-keys: |
            bazel-coverage-${{ runner.os }}-
            bazel-coverage-

      - name: Print the list of targets
        run: bazel query --output label_kind //...

      - name: Show compiler selection
        run: |
          "$CC" --version
          "$CXX" --version

      # continue-on-error so partial coverage is still uploaded when some
      # tests fail (the failure is re-raised after the upload below).
      - id: coverage
        continue-on-error: true
        # Same instrumentation filter as scripts/getcov.sh so the dashboard
        # measures the main packages only (no third_party / helper tooling).
        run: bazel coverage --keep_going --collect_code_coverage --test_tag_filters=-fixme --combined_report=lcov --test_output=all --instrumentation_filter='^//(core|graph|lnast|parser|inou|lhd|lsp|pass|upass|ware|simlib|packages)(/|:)' //...

      - uses: codecov/codecov-action@v7
        with:
          slug: masc-ucsc/livehd
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./bazel-out/_coverage/_coverage_report.dat
          disable_search: true

      - name: Propagate test failures
        if: steps.coverage.outcome == 'failure'
        run: exit 1
